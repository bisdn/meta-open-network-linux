#@TYPE: Machine
#@NAME: accton-csp7551

#@DESCRIPTION: Machine configuration for accton-csp7551 systems

PREFERRED_PROVIDER_virtual/kernel ?= "linux-yocto-onl"
PREFERRED_VERSION_linux-yocto-onl ?= "5.4%"

KMACHINE:accton-csp7551 = "x86_64-intel"
KERNEL_FEATURES += "bsp/x86_64-intel"

DEFAULTTUNE ?= "corei7-64"

# https://git.yoctoproject.org/poky/tree/meta/conf/machine/include?h=kirkstone
require conf/machine/include/x86/tune-corei7.inc
require conf/machine/include/x86/x86-base.inc
# https://github.com/bisdn/meta-open-network-linux/blob/master/conf/machine/include/onl.inc
require conf/machine/include/onl.inc

BISDN_SWITCH_IMAGE_EXTRA_INSTALL:remove = " onl"

MACHINE_FEATURES += "pcbios efi"
MACHINE_FEATURES:remove = "alsa"

SYSLINUX_OPTS = "serial 1 115200"
SERIAL_CONSOLE = "115200 ttyS0"
APPEND += "console=ttyS0,115200 console=tty0"

PLATFORM_VENDOR = "accton"
BISDN_ONIE_MACHINE = "csp7551"
BISDN_ONIE_PLATFORM = "x86_64-accton-csp7551-r0"

ONIE_VENDOR = "accton"
ONIE_MACHINE_TYPE = "csp7551"

CONSOLE_SPEED = "115200"
CONSOLE_DEV = "0"
CONSOLE_PORT = "0x3f8"

GLIBC_ADDONS = "nptl"

MACHINE_EXTRA_RDEPENDS += " \
    accton-csp7551-cpld-mod \
    accton-csp7551-fpga-mod \
    accton-csp7551-sfp-mod \
    accton-csp7551-at24-mod \
    intel-bf-kdrv-mod \
    intel-bf-tun-mod \
"
MACHINE_EXTRA_RDEPENDS += "platform-${ONIE_MACHINE_TYPE}"
